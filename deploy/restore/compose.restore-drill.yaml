name: researchos-restore-drill

services:
  restore-postgres:
    image: pgvector/pgvector:0.8.2-pg17-bookworm
    profiles: ["restore-drill"]
    restart: "no"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: researchos_restore
      POSTGRES_PASSWORD: isolated-restore-drill-only
    tmpfs:
      - /var/lib/postgresql/data
    networks: [restore_drill]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchos_restore -d postgres"]
      interval: 2s
      timeout: 2s
      retries: 30

  restore-minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    profiles: ["restore-drill"]
    command: server /data
    restart: "no"
    environment:
      MINIO_ROOT_USER: researchos_restore
      MINIO_ROOT_PASSWORD: isolated-restore-drill-only
    tmpfs:
      - /data
    networks: [restore_drill]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  restore-drill:
    profiles: ["restore-drill"]
    build:
      context: ..
      dockerfile: restore/Dockerfile
    restart: "no"
    environment:
      PGPASSWORD: isolated-restore-drill-only
    command:
      - --matrix
      - /contract/recovery-coverage-v1.json
      - --manifest
      - /backups/${RESTORE_MANIFEST:?set RESTORE_MANIFEST}
      - --backup-root
      - /backups
      - --output
      - /reports/${RESTORE_REPORT:-restore-drill-report.json}
    volumes:
      - researchos_backup_data:/backups:ro
      - ../backup/recovery-coverage-v1.json:/contract/recovery-coverage-v1.json:ro
      - ${RESTORE_REPORT_DIR:?set RESTORE_REPORT_DIR}:/reports
    tmpfs:
      - /work
    networks: [restore_drill]
    depends_on:
      restore-postgres: {condition: service_healthy}
      restore-minio: {condition: service_healthy}

networks:
  restore_drill:
    internal: true

volumes:
  researchos_backup_data:
    external: true
