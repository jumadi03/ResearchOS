name: researchos

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-researchos}
      POSTGRES_USER: ${POSTGRES_USER:-researchos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-researchos} -d ${POSTGRES_DB:-researchos}
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:17-bookworm
    restart: "no"
    env_file: ["stack.hostinger.env"]
    environment:
      PGHOST: postgres
      PGDATABASE: ${POSTGRES_DB:-researchos}
      PGUSER: ${POSTGRES_USER:-researchos}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./migrate/migrate.sh:/usr/local/bin/migrate.sh:ro
      - ./postgres/init:/migrations:ro
    command: ["bash", "/usr/local/bin/migrate.sh"]
    depends_on:
      postgres: {condition: service_healthy}

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address :9001
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-researchos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set researchos http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" --api S3v4 &&
        mc mb --ignore-existing researchos/researchos-documents &&
        mc mb --ignore-existing researchos/researchos-backups
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-researchos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    depends_on:
      minio: {condition: service_healthy}

  api:
    build: {context: ../AI-Gateway}
    restart: unless-stopped
    env_file: ["stack.hostinger.env"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-researchos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-researchos}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-researchos}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_DOCUMENT_BUCKET: researchos-documents
      KNOWLEDGE_OUTPUT_ROOT: /data/knowledge
      REPOSITORY_DASHBOARD_ROOT: /data/architecture/repository-dashboard
      REPOSITORY_DASHBOARD_EXPECTED_REVISION: ${REPOSITORY_DASHBOARD_EXPECTED_REVISION:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
      MODEL_NAME: ${MODEL_NAME:-qwen3:8b}
      RESTORE_TRUST_ROOT: /restore-trust
    volumes:
      - knowledge_data:/data/knowledge
      - architecture_data:/data/architecture
      - ./restore/trust:/restore-trust:ro
    expose: ["8000"]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      migrate: {condition: service_completed_successfully}
      minio-init: {condition: service_completed_successfully}
    labels:
      traefik.enable: "true"
      traefik.docker.network: n8n_default
      traefik.http.routers.researchos-api.entrypoints: web,websecure
      traefik.http.routers.researchos-api.rule: Host(`${RESEARCHOS_API_HOSTNAME}`)
      traefik.http.routers.researchos-api.tls: "true"
      traefik.http.routers.researchos-api.tls.certresolver: mytlschallenge
      traefik.http.routers.researchos-api.middlewares: researchos-security@docker
      traefik.http.middlewares.researchos-security.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.researchos-security.headers.forceSTSHeader: "true"
      traefik.http.middlewares.researchos-security.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.researchos-security.headers.stsPreload: "true"
      traefik.http.middlewares.researchos-security.headers.stsSeconds: "31536000"
      traefik.http.services.researchos-api.loadbalancer.server.port: "8000"
    networks:
      - default
      - traefik

  worker:
    build: {context: ../AI-Gateway}
    command: ["python", "-m", "app.workers.main"]
    restart: unless-stopped
    env_file: ["stack.hostinger.env"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-researchos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-researchos}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-researchos}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_DOCUMENT_BUCKET: researchos-documents
      KNOWLEDGE_OUTPUT_ROOT: /data/knowledge
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      JOB_LEASE_SECONDS: ${JOB_LEASE_SECONDS:-660}
      JOB_RETRY_BASE_SECONDS: ${JOB_RETRY_BASE_SECONDS:-5}
      JOB_TIMEOUT_SECONDS: ${JOB_TIMEOUT_SECONDS:-600}
      WORKER_METRICS_PORT: 9102
    volumes:
      - knowledge_data:/data/knowledge
    depends_on:
      migrate: {condition: service_completed_successfully}
      minio-init: {condition: service_completed_successfully}

volumes:
  postgres_data:
  minio_data:
  knowledge_data:
  architecture_data:

networks:
  traefik:
    external: true
    name: n8n_default
