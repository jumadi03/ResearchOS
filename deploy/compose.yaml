name: researchos

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-researchos}
      POSTGRES_USER: ${POSTGRES_USER:-researchos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports: ["127.0.0.1:5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-researchos} -d ${POSTGRES_DB:-researchos}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:17-bookworm
    restart: "no"
    env_file: ["stack.env"]
    environment:
      PGHOST: postgres
      PGDATABASE: ${POSTGRES_DB:-researchos}
      PGUSER: ${POSTGRES_USER:-researchos}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./migrate/migrate.sh:/usr/local/bin/migrate.sh:ro
      - ./postgres/init:/migrations:ro
    command: ["bash", "/usr/local/bin/migrate.sh"]
    depends_on:
      postgres: {condition: service_healthy}

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address :9001
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-researchos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    ports: ["127.0.0.1:9000:9000", "127.0.0.1:9101:9001"]
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set researchos http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" --api S3v4 &&
        mc mb --ignore-existing researchos/researchos-documents &&
        mc mb --ignore-existing researchos/researchos-backups
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-researchos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    depends_on:
      minio: {condition: service_healthy}

  api:
    build: {context: ../AI-Gateway}
    restart: unless-stopped
    env_file: ["stack.env"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-researchos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-researchos}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-researchos}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_DOCUMENT_BUCKET: researchos-documents
      KNOWLEDGE_OUTPUT_ROOT: /data/knowledge
      REPOSITORY_DASHBOARD_ROOT: /data/architecture/repository-dashboard
      REPOSITORY_DASHBOARD_EXPECTED_REVISION: ${REPOSITORY_DASHBOARD_EXPECTED_REVISION:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
      MODEL_NAME: ${MODEL_NAME:-qwen3:8b}
      RESTORE_TRUST_ROOT: /restore-trust
    volumes:
      - knowledge_data:/data/knowledge
      - architecture_data:/data/architecture
      - ./restore/trust:/restore-trust:ro
    ports: ["127.0.0.1:8080:8000"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      minio-init: {condition: service_completed_successfully}

  worker:
    build: {context: ../AI-Gateway}
    command: ["python", "-m", "app.workers.main"]
    restart: unless-stopped
    env_file: ["stack.env"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-researchos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-researchos}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-researchos}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_DOCUMENT_BUCKET: researchos-documents
      KNOWLEDGE_OUTPUT_ROOT: /data/knowledge
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      JOB_LEASE_SECONDS: ${JOB_LEASE_SECONDS:-660}
      JOB_RETRY_BASE_SECONDS: ${JOB_RETRY_BASE_SECONDS:-5}
      JOB_TIMEOUT_SECONDS: ${JOB_TIMEOUT_SECONDS:-600}
      WORKER_METRICS_PORT: 9102
    volumes: ["knowledge_data:/data/knowledge"]
    expose: ["9102"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      minio-init: {condition: service_completed_successfully}

  restore-admission:
    profiles: ["restore-admission"]
    build: {context: ../AI-Gateway}
    restart: "no"
    env_file: ["stack.env"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-researchos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-researchos}
    command:
      - python
      - /admission/admit_restore_report.py
      - --report
      - /report/restore-drill-report.json
      - --trust-root
      - /restore-trust
      - --database-url
      - postgresql://${POSTGRES_USER:-researchos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-researchos}
    volumes:
      - ${RESTORE_REPORT_PATH:-./restore/reports/restore-drill-report.json}:/report/restore-drill-report.json:ro
      - ./restore/trust:/restore-trust:ro
      - ./restore/admit_restore_report.py:/admission/admit_restore_report.py:ro
    depends_on:
      migrate: {condition: service_completed_successfully}

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-researchos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-researchos}?sslmode=disable
    depends_on:
      postgres: {condition: service_healthy}

  prometheus:
    image: prom/prometheus:v3.8.1
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=15d"]
    ports: ["127.0.0.1:9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/worker-alerts.yml:/etc/prometheus/worker-alerts.yml:ro
      - ./monitoring/prometheus.token:/etc/prometheus/prometheus.token:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:13.0.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
    ports: ["127.0.0.1:3000:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

  backup:
    build: {context: ./backup}
    restart: unless-stopped
    env_file: ["stack.env"]
    environment:
      PGHOST: postgres
      PGDATABASE: ${POSTGRES_DB:-researchos}
      PGUSER: ${POSTGRES_USER:-researchos}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-researchos}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_DOCUMENT_BUCKET: ${MINIO_DOCUMENT_BUCKET:-researchos-documents}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - backup_data:/backups
      - knowledge_data:/source/knowledge:ro
      - architecture_data:/source/architecture:ro
      - ./compose.yaml:/source/configuration/compose.yaml:ro
      - ./stack.env.example:/source/configuration/stack.env.example:ro
      - ./backup/recovery-coverage-v1.json:/source/configuration/recovery-coverage-v1.json:ro
      - ./migrate/migrate.sh:/source/migration/migrate.sh:ro
      - ./postgres/init:/source/migration/sql:ro
    depends_on:
      migrate: {condition: service_completed_successfully}
      minio-init: {condition: service_completed_successfully}

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
  backup_data:
  knowledge_data:
  architecture_data:
