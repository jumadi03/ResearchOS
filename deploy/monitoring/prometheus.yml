global:
  scrape_interval: 15s
rule_files:
  - /etc/prometheus/worker-alerts.yml
scrape_configs:
  - job_name: researchos-api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/prometheus.token
    static_configs: [{targets: ["api:8000"]}]
  - job_name: postgres
    static_configs: [{targets: ["postgres-exporter:9187"]}]
  - job_name: researchos-worker
    static_configs: [{targets: ["worker:9102"]}]
  - job_name: prometheus
    static_configs: [{targets: ["prometheus:9090"]}]
