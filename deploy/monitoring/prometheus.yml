global:
  scrape_interval: 15s
scrape_configs:
  - job_name: researchos-api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/researchos.token
    static_configs: [{targets: ["api:8000"]}]
  - job_name: postgres
    static_configs: [{targets: ["postgres-exporter:9187"]}]
  - job_name: prometheus
    static_configs: [{targets: ["prometheus:9090"]}]
