name: Feature request
description: Propose a scoped ResearchOS improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What research or engineering problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe observable behavior, not only implementation.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Integrity and trust boundaries
      description: Explain effects on provenance, human review, authentication, or immutability.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
