name: Bug report
description: Report a reproducible defect without sensitive data
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private research data, or vulnerabilities.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal, sanitized steps.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Commit or version
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Logs or screenshots with all secrets and private data removed.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, personal data, and private research content.
          required: true
        - label: This is not a security vulnerability requiring private reporting.
          required: true
