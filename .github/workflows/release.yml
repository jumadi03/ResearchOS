name: Reproducible Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Verify, build, attest, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: AI-Gateway
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: AI-Gateway/pyproject.toml
      - name: Verify tag matches project version
        shell: bash
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          test "${GITHUB_REF_NAME}" = "v${version}"
      - name: Install release dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Verify dependency consistency
        run: python -m pip check
      - name: Run full regression suite
        run: python -m pytest -q --basetemp="${{ runner.temp }}/researchos-release-tests"
      - name: Build release artifacts
        run: python ../Scripts/build_release.py
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "${{ github.workspace }}/dist/release/*"
      - name: Upload verified artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: "ResearchOS-${{ github.ref_name }}"
          path: dist/release/*
          if-no-files-found: error
          retention-days: 90
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          ../dist/release/*
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --title "ResearchOS ${GITHUB_REF_NAME}"
          --notes-file ../RELEASE_NOTES.md
