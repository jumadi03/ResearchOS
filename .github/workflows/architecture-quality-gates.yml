name: Architecture Quality Gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: architecture-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: AI-Gateway

jobs:
  regression:
    name: Full regression and architecture coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: AI-Gateway/pyproject.toml
      - name: Install project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Verify dependency consistency
        run: python -m pip check
      - name: Run full regression suite
        run: >-
          python -m pytest
          --cov=app.architecture
          --cov=app.observability
          --cov=app.router.architecture
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=90
          -q

  knowledge-product:
    name: Knowledge and product regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: AI-Gateway/pyproject.toml
      - name: Install project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Run knowledge and product regression
        run: >-
          python -m pytest
          app/knowledge/tests
          --cov=app.knowledge
          --cov=app.router.knowledge
          --cov=app.router.session
          --cov=app.router.workspace
          --cov-report=term-missing
          --cov-report=xml:knowledge-coverage.xml
          --cov-fail-under=70
          -q

  deployment-contracts:
    name: Container and deployment contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Prepare isolated CI configuration
        working-directory: deploy
        run: |
          cp stack.env.example stack.env
          printf 'ci-auditor-token\n' > monitoring/prometheus.token
      - name: Validate Compose configuration
        working-directory: deploy
        run: >-
          docker compose
          --env-file stack.env.example
          -f compose.yaml
          config --quiet
      - name: Validate Prometheus configuration and alert rules
        working-directory: deploy
        run: >-
          docker run --rm
          --entrypoint promtool
          --volume "$PWD/monitoring:/etc/prometheus:ro"
          prom/prometheus:v3.8.1
          check config /etc/prometheus/prometheus.yml
      - name: Build API and worker image
        working-directory: AI-Gateway
        run: |
          docker version
          for attempt in 1 2 3; do
            if docker build --progress plain --tag researchos-ci .; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::API image build failed after 3 attempts"
              exit 1
            fi
            delay=$((attempt * 5))
            echo "::warning::API image build attempt $attempt failed; retrying in ${delay}s"
            sleep "$delay"
          done
      - name: Build backup image
        working-directory: deploy/backup
        run: |
          for attempt in 1 2 3; do
            if docker build --progress plain --tag researchos-backup-ci .; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Backup image build failed after 3 attempts"
              exit 1
            fi
            delay=$((attempt * 5))
            echo "::warning::Backup image build attempt $attempt failed; retrying in ${delay}s"
            sleep "$delay"
          done
      - name: Validate and build isolated restore drill
        working-directory: deploy/restore
        env:
          RESTORE_MANIFEST: backup-set-20000101T000000Z.json
          RESTORE_REPORT_DIR: /tmp/researchos-restore-report
        run: |
          docker compose -f compose.restore-drill.yaml --profile restore-drill config --quiet
          docker build --progress plain --tag researchos-restore-drill-ci --file Dockerfile ..

  storage-integration:
    name: PostgreSQL and MinIO integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Prepare isolated CI configuration
        working-directory: deploy
        run: |
          cp stack.env.example stack.env
          printf 'ci-auditor-token\n' > monitoring/prometheus.token
      - name: Start canonical storage stack
        working-directory: deploy
        run: >-
          docker compose
          --env-file stack.env
          -f compose.yaml
          up --build --detach --wait
          postgres minio api
      - name: Verify canonical schema and append-only provenance
        working-directory: deploy
        run: >-
          docker compose
          --env-file stack.env
          -f compose.yaml
          exec -T postgres
          psql -v ON_ERROR_STOP=1
          -U researchos -d researchos
          -f /dev/stdin
          < verify/canonical_storage_healthcheck.sql
      - name: Verify canonical repository idempotency
        working-directory: deploy
        run: |
          docker compose --env-file stack.env -f compose.yaml cp verify/canonical_repository.py api:/tmp/canonical_repository.py
          docker compose --env-file stack.env -f compose.yaml exec -T api python /tmp/canonical_repository.py
      - name: Verify PostgreSQL and MinIO representation integrity
        working-directory: deploy
        run: |
          docker compose --env-file stack.env -f compose.yaml cp verify/representation_repository.py api:/tmp/representation_repository.py
          docker compose --env-file stack.env -f compose.yaml exec -T api python /tmp/representation_repository.py
          docker compose --env-file stack.env -f compose.yaml cp verify/source_inspection.py api:/tmp/source_inspection.py
          docker compose --env-file stack.env -f compose.yaml exec -T api python /tmp/source_inspection.py
          docker compose --env-file stack.env -f compose.yaml cp verify/screening_decision.py api:/tmp/screening_decision.py
          docker compose --env-file stack.env -f compose.yaml exec -T api python /tmp/screening_decision.py
      - name: Verify evidence admission and canonical graph safety
        working-directory: deploy
        run: |
          docker compose --env-file stack.env -f compose.yaml cp verify/canonical_evidence.py api:/tmp/canonical_evidence.py
          docker compose --env-file stack.env -f compose.yaml exec -T api python /tmp/canonical_evidence.py
          docker compose --env-file stack.env -f compose.yaml cp verify/canonical_graph.py api:/tmp/canonical_graph.py
          docker compose --env-file stack.env -f compose.yaml exec -T api python /tmp/canonical_graph.py
      - name: Verify worker lease recovery and dead-letter lifecycle
        working-directory: deploy
        run: |
          docker compose --env-file stack.env -f compose.yaml up --detach worker
          docker compose --env-file stack.env -f compose.yaml cp verify/resilient_worker.py api:/tmp/resilient_worker.py
          docker compose --env-file stack.env -f compose.yaml exec -T api python /tmp/resilient_worker.py
      - name: Verify continuous monitoring lifecycle and safety
        working-directory: deploy
        run: |
          docker compose --env-file stack.env -f compose.yaml cp verify/continuous_monitoring.py api:/tmp/continuous_monitoring.py
          docker compose --env-file stack.env -f compose.yaml exec -T api python /tmp/continuous_monitoring.py
      - name: Show service logs after failure
        if: failure()
        working-directory: deploy
        run: docker compose --env-file stack.env -f compose.yaml logs --no-color
      - name: Stop isolated CI stack
        if: always()
        working-directory: deploy
        run: docker compose --env-file stack.env -f compose.yaml down --volumes

  governance-contracts:
    name: Schema, ARC, and persistence gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: AI-Gateway/pyproject.toml
      - name: Install project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Verify governance contracts
        run: >-
          python -m pytest
          app/architecture/tests/test_schema_compatibility.py
          app/architecture/tests/test_arc_generator.py
          app/architecture/tests/test_arc_publisher.py
          app/architecture/tests/test_transactional_persistence.py
          -q

  dependency-security:
    name: Dependency security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: AI-Gateway/pyproject.toml
      - name: Install project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Compile Python sources
        run: python -m compileall -q app
      - name: Audit installed dependencies
        run: python -m pip_audit --local
